spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/hrmapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    com.hrmapp.api: INFO