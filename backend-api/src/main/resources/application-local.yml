spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hrmapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.security: INFO
    com.hrmapp.api: DEBUG